<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Translator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }
        select, textarea {
            width: 100%;
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        #translatedText {
            font-size: 18px;
            margin-top: 1rem;
            text-align: left;
            white-space: pre-wrap;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Multi-Language Translator</h1>
        <select id="languageSelector"></select>
        <textarea id="inputText" placeholder="Enter text to translate"></textarea>
        <button onclick="translateText()">Translate</button>
        <div id="translatedText"></div>
    </div>

    <script>
        const languages = [
            { code: 'en', name: 'English' },
            { code: 'hi', name: '?????? (Hindi)' },
            { code: 'bn', name: '????? (Bengali)' },
            { code: 'ta', name: '????? (Tamil)' },
            { code: 'te', name: '?????? (Telugu)' },
            { code: 'ml', name: '?????? (Malayalam)' },
            { code: 'kn', name: '????? (Kannada)' }
        ];

        const translations = {
            en: {
                title: 'Multi-Language Translator',
                placeholder: 'Enter text to translate',
                translateButton: 'Translate'
            },
            hi: {
                title: '???-???? ???????',
                placeholder: '?????? ???? ?? ??? ??????? ???? ????',
                translateButton: '?????? ????'
            },
            bn: {
                title: '???????? ???????',
                placeholder: '?????? ???? ?????? ?????',
                translateButton: '?????? ????'
            },
            ta: {
                title: '?? ???? ????????????????',
                placeholder: '???????????? ????? ??????????',
                translateButton: '?????????'
            },
            te: {
                title: '??????? ??????????',
                placeholder: '?????????????? ???????? ????? ??????',
                translateButton: '?????????'
            },
            ml: {
                title: '??????? ?????????',
                placeholder: '????????? ??????? ?????????? ?????',
                translateButton: '????????? ???????'
            },
            kn: {
                title: '??????? ???????',
                placeholder: '?????????? ????????? ???????',
                translateButton: '?????????'
            }
        };

        const inputText = document.getElementById('inputText');
        const translatedText = document.getElementById('translatedText');
        const languageSelector = document.getElementById('languageSelector');
        const title = document.querySelector('h1');
        const translateButton = document.querySelector('button');

        function populateLanguageSelector() {
            languages.forEach(lang => {
                const option = document.createElement('option');
                option.value = lang.code;
                option.textContent = lang.name;
                languageSelector.appendChild(option);
            });
        }

        function updateLanguage() {
            const selectedLanguage = languageSelector.value;
            title.textContent = translations[selectedLanguage].title;
            inputText.placeholder = translations[selectedLanguage].placeholder;
            translateButton.textContent = translations[selectedLanguage].translateButton;
        }

        function translateText() {
            const text = inputText.value;
            const targetLang = languageSelector.value;

            if (text.trim() === '') {
                alert('Please enter some text to translate.');
                return;
            }

            const apiUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const translatedContent = data[0].map(item => item[0]).join('');
                    translatedText.textContent = translatedContent;
                })
                .catch(error => {
                    console.error('Translation error:', error);
                    translatedText.textContent = 'Error: Unable to translate text.';
                });
        }

        populateLanguageSelector();
        languageSelector.addEventListener('change', updateLanguage);
        updateLanguage();
    </script>
</body>
</html>
